# Minimal opt-in smoke configuration for FIRS-Gate and trigger-family checks.
# This file is intentionally separate from paper/default configs.
enable_firs_gate: true
pipeline_mode: controlled
debug_firs_gate: true

client_filter: true
prefilter_threshold: 0.001
prefilter_apply_to: poisoned

detector_train_trigger_type: randomized_patch
attack_eval_trigger_type: colored_patch
trigger_color: green
trigger_alpha: 0.35
trigger_randomize: true
trigger_jitter: 1
trigger_size_delta: 1
trigger_intensity: 1.0

poison_label_swap: 2
poisoning_per_batch: 2
trigger_num: 4
0_poison_pattern: [[0, 0], [0, 1], [0, 2], [0, 3]]
1_poison_pattern: [[0, 6], [0, 7], [0, 8], [0, 9]]
2_poison_pattern: [[3, 0], [3, 1], [3, 2], [3, 3]]
3_poison_pattern: [[3, 6], [3, 7], [3, 8], [3, 9]]
